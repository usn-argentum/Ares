teleop_twist_joy:
  ros__parameters:
    # PS5 DualSense axis mapping (confirmed):
    # Axis 1 : left stick up/down   -> linear.x
    # Axis 3 : right stick left/right -> angular.z
    # Button 4 : L1 -> deadman switch
    axis_linear:
      x: 1
    scale_linear:
      x: 1.0
    scale_linear_turbo:
      x: 1.0
    axis_angular:
      yaw: 3
    scale_angular:
      yaw: 1.0
    enable_button: 4
    require_enable_button: true
